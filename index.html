<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Mika — Cinéma privé</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14111c;
    --surface:#1f1a2b;
    --surface-2:#2a2338;
    --gold:#e7b93f;
    --gold-dim:#8a712c;
    --rose:#c1447e;
    --ivory:#f5f0e6;
    --muted:#9d93ab;
    --line:rgba(245,240,230,0.09);
    --radius:14px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(231,185,63,0.08), transparent 60%),
      var(--bg);
    color:var(--ivory);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }

  ::selection{background:var(--gold);color:#1a1420;}

  a{color:inherit;}

  /* ---------- Marquee header ---------- */
  .marquee{
    position:relative;
    padding:38px 24px 26px;
    text-align:center;
    border-bottom:1px solid var(--line);
    overflow:hidden;
  }
  .marquee::before, .marquee::after{
    content:"";
    position:absolute;
    left:0; right:0;
    height:3px;
    background-image:radial-gradient(circle, var(--gold) 1.6px, transparent 1.8px);
    background-size:22px 3px;
    opacity:0.55;
  }
  .marquee::before{ top:10px; }
  .marquee::after{ bottom:10px; }
  @media (prefers-reduced-motion: no-preference){
    .marquee::before, .marquee::after{
      animation: twinkle 2.4s ease-in-out infinite alternate;
    }
  }
  @keyframes twinkle{
    from{ opacity:0.3; }
    to{ opacity:0.75; }
  }

  .marquee h1{
    font-family:'Bebas Neue', sans-serif;
    font-size:clamp(2.6rem, 7vw, 4.6rem);
    letter-spacing:0.09em;
    margin:0;
    color:var(--gold);
    text-shadow:0 0 18px rgba(231,185,63,0.35), 0 0 2px rgba(231,185,63,0.6);
  }
  .marquee p{
    margin:6px 0 0;
    color:var(--muted);
    font-size:0.95rem;
    letter-spacing:0.02em;
  }

  /* ---------- Controls ---------- */
  .controls{
    max-width:1180px;
    margin:0 auto;
    padding:28px 24px 6px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .search-row{
    display:flex;
    gap:12px;
  }
  .search-row input{
    flex:1;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 16px;
    color:var(--ivory);
    font-family:'Inter',sans-serif;
    font-size:0.95rem;
    outline:none;
    transition:border-color .2s;
  }
  .search-row input:focus{
    border-color:var(--gold);
  }
  .search-row input::placeholder{ color:var(--muted); }

  .refresh-btn{
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--muted);
    border-radius:10px;
    padding:0 16px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    font-weight:500;
    font-size:0.9rem;
    transition:.2s;
  }
  .refresh-btn:hover{ color:var(--gold); border-color:var(--gold-dim); }
  .refresh-btn:focus-visible, a:focus-visible, button:focus-visible, input:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }

  /* ---------- Ticket-style category chips ---------- */
  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }
  .chip{
    position:relative;
    padding:9px 20px;
    border-radius:999px;
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--muted);
    font-size:0.85rem;
    font-weight:600;
    letter-spacing:0.03em;
    cursor:pointer;
    -webkit-mask:
      radial-gradient(circle 4px at 0 50%, transparent 4px, black 4.5px),
      radial-gradient(circle 4px at 100% 50%, transparent 4px, black 4.5px);
    -webkit-mask-composite: source-in;
    mask-composite: intersect;
    transition:.18s;
  }
  .chip:hover{ color:var(--ivory); border-color:var(--gold-dim); }
  .chip.active{
    background:var(--gold);
    color:#1a1420;
    border-color:var(--gold);
  }
  .chip .count{
    opacity:0.65;
    font-family:'JetBrains Mono',monospace;
    font-size:0.75rem;
    margin-left:6px;
  }

  /* ---------- Grid ---------- */
  .grid-wrap{
    max-width:1180px;
    margin:0 auto;
    padding:20px 24px 70px;
  }
  .cat-heading{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:0.05em;
    font-size:1.4rem;
    color:var(--rose);
    margin:34px 0 16px;
  }
  .cat-heading:first-child{ margin-top:6px; }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(210px,1fr));
    gap:20px;
  }

  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    cursor:pointer;
    transition:transform .18s, box-shadow .18s, border-color .18s;
  }
  .card:hover, .card:focus-visible{
    transform:translateY(-4px);
    border-color:var(--gold-dim);
    box-shadow:0 12px 28px rgba(0,0,0,0.45), 0 0 0 1px rgba(231,185,63,0.15);
  }
  .poster{
    position:relative;
    aspect-ratio:16/9;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:linear-gradient(135deg, var(--surface-2), #171320);
  }
  .poster img{
    width:100%; height:100%; object-fit:cover;
  }
  .poster .initials{
    font-family:'Bebas Neue', sans-serif;
    font-size:2.6rem;
    letter-spacing:0.05em;
    color:rgba(245,240,230,0.16);
  }
  .poster .play{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(20,17,28,0.0);
    transition:background .18s;
  }
  .card:hover .play{ background:rgba(20,17,28,0.35); }
  .play svg{
    width:44px; height:44px;
    opacity:0;
    transform:scale(0.8);
    transition:.18s;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.5));
  }
  .card:hover .play svg{ opacity:1; transform:scale(1); }

  .card-body{ padding:12px 14px 14px; }
  .card-title{
    font-size:0.92rem;
    font-weight:600;
    line-height:1.3;
    margin:0 0 6px;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card-meta{
    font-family:'JetBrains Mono',monospace;
    font-size:0.72rem;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
  }

  /* ---------- Empty state ---------- */
  .empty{
    text-align:center;
    padding:80px 20px;
    color:var(--muted);
  }
  .empty svg{ width:56px; height:56px; opacity:0.4; margin-bottom:16px; }
  .empty h2{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:0.04em;
    color:var(--ivory);
    font-size:1.5rem;
    margin:0 0 8px;
  }
  .empty code{
    background:var(--surface);
    padding:2px 7px;
    border-radius:6px;
    font-family:'JetBrains Mono',monospace;
    font-size:0.85rem;
  }

  /* ---------- Modal player ---------- */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(10,8,14,0.86);
    backdrop-filter:blur(6px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:24px;
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    width:100%;
    max-width:960px;
  }
  .modal-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    gap:16px;
  }
  .modal-head h3{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:0.03em;
    font-size:1.5rem;
    color:var(--gold);
    margin:0;
  }
  .modal-close{
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--ivory);
    width:38px; height:38px;
    border-radius:50%;
    cursor:pointer;
    flex-shrink:0;
    font-size:1.1rem;
    line-height:1;
  }
  .modal-close:hover{ border-color:var(--gold); color:var(--gold); }
  video{
    width:100%;
    border-radius:var(--radius);
    background:#000;
    max-height:78vh;
    display:block;
  }

  /* ---------- Footer ---------- */
  footer{
    text-align:center;
    padding:24px;
    color:var(--muted);
    font-size:0.78rem;
    border-top:1px solid var(--line);
  }
  footer code{
    background:var(--surface);
    padding:2px 6px;
    border-radius:5px;
    font-family:'JetBrains Mono',monospace;
  }

  @media (max-width:560px){
    .search-row{ flex-direction:column; }
  }
</style>
</head>
<body>

  <header class="marquee">
    <h1>SITE MIKA</h1>
    <p>Le petit cinéma de la maison</p>
  </header>

  <div class="controls">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Rechercher une vidéo…" autocomplete="off">
      <button class="refresh-btn" id="refreshBtn" title="Recharger la liste des vidéos">↻ Recharger</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <main class="grid-wrap" id="gridWrap">
    <div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2"/><path d="M3 10h18"/></svg>
      <h2>Chargement de la liste…</h2>
      <p>Un instant.</p>
    </div>
  </main>

  <footer>
    Ajouté de nouvelles vidéos ? Relance <code>generate_manifest.py</code> sur le NAS, puis pousse le manifest sur GitHub.
  </footer>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">Titre</h3>
        <button class="modal-close" id="modalClose" aria-label="Fermer">✕</button>
      </div>
      <video id="modalVideo" controls playsinline></video>
    </div>
  </div>

<script>
(function(){
  // ==========================================
  // CONFIGURATION DE L'ADRESSE DU NAS
  // ==========================================
  // Remplace par ton IP ou ton nom de domaine DDNS (ex: "https://mika.synology.me:5001")
  // Attention à bien utiliser HTTPS si ton site GitHub Pages est en HTTPS.
  const NAS_URL = "https://192-168-1-2.michael58000.direct.quickconnect.to:5001";

  const gridWrap = document.getElementById('gridWrap');
  const chipsEl = document.getElementById('chips');
  const searchInput = document.getElementById('searchInput');
  const refreshBtn = document.getElementById('refreshBtn');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalVideo = document.getElementById('modalVideo');
  const modalTitle = document.getElementById('modalTitle');
  const modalClose = document.getElementById('modalClose');

  let manifest = { categories: [] };
  let activeCategory = 'ALL';

  const playIcon = `<svg viewBox="0 0 24 24" fill="var(--gold)"><path d="M8 5v14l11-7z"/></svg>`;

  function formatDuration(sec){
    if(!sec && sec !== 0) return '—';
    sec = Math.round(sec);
    const h = Math.floor(sec/3600);
    const m = Math.floor((sec%3600)/60);
    const s = sec%60;
    const pad = n => String(n).padStart(2,'0');
    return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
  }

  function initials(title){
    return title
      .split(/\s+/)
      .filter(Boolean)
      .slice(0,2)
      .map(w => w[0].toUpperCase())
      .join('');
  }

  function escapeHtml(str){
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function loadManifest(){
    gridWrap.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2"/><path d="M3 10h18"/></svg>
      <h2>Chargement…</h2></div>`;
    try{
      // Chargé depuis GitHub Pages (local au site) pour éviter les blocages CORS
      const res = await fetch('manifest.json?_=' + Date.now());
      if(!res.ok) throw new Error('no manifest');
      manifest = await res.json();
    }catch(e){
      manifest = { categories: [] };
    }
    renderChips();
    render();
  }

  function renderChips(){
    const totalCount = manifest.categories.reduce((a,c)=>a+c.videos.length,0);
    let html = `<div class="chip ${activeCategory==='ALL'?'active':''}" data-cat="ALL">Toutes<span class="count">${totalCount}</span></div>`;
    manifest.categories.forEach(cat=>{
      html += `<div class="chip ${activeCategory===cat.name?'active':''}" data-cat="${escapeHtml(cat.name)}">${escapeHtml(cat.name)}<span class="count">${cat.videos.length}</span></div>`;
    });
    chipsEl.innerHTML = html;
    chipsEl.querySelectorAll('.chip').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        activeCategory = chip.dataset.cat;
        renderChips();
        render();
      });
    });
  }

  function render(){
    const query = searchInput.value.trim().toLowerCase();
    const cats = manifest.categories
      .filter(c => activeCategory === 'ALL' || c.name === activeCategory)
      .map(c => ({ name: c.name, videos: c.videos.filter(v => v.title.toLowerCase().includes(query)) }))
      .filter(c => c.videos.length > 0);

    if(cats.length === 0){
      gridWrap.innerHTML = `<div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2"/><path d="M3 10h18"/></svg>
        <h2>Aucune vidéo pour le moment</h2>
        <p>Dépose des fichiers .mp4 dans le dossier, puis exécute<br><code>python3 generate_manifest.py</code></p>
      </div>`;
      return;
    }

    let html = '';
    cats.forEach(cat=>{
      if(activeCategory === 'ALL'){
        html += `<h2 class="cat-heading">${escapeHtml(cat.name)}</h2>`;
      }
      html += '<div class="grid">';
      cat.videos.forEach(v=>{
        // On va chercher l'image de la vignette directement sur le NAS
        const poster = v.thumbnail
          ? `<img src="${NAS_URL}/${encodeURI(v.thumbnail)}" alt="">`
          : `<span class="initials">${escapeHtml(initials(v.title))}</span>`;
        html += `
          <div class="card" tabindex="0" role="button" data-file="${encodeURI(v.file)}" data-title="${escapeHtml(v.title)}">
            <div class="poster">
              ${poster}
              <div class="play">${playIcon}</div>
            </div>
            <div class="card-body">
              <p class="card-title">${escapeHtml(v.title)}</p>
              <div class="card-meta">
                <span>${escapeHtml(cat.name)}</span>
                <span>${formatDuration(v.duration)}</span>
              </div>
            </div>
          </div>`;
      });
      html += '</div>';
    });
    gridWrap.innerHTML = html;

    gridWrap.querySelectorAll('.card').forEach(card=>{
      const open = ()=> openModal(card.dataset.file, card.dataset.title);
      card.addEventListener('click', open);
      card.addEventListener('keydown', e=>{ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); open(); } });
    });
  }

  function openModal(file, title){
    modalTitle.textContent = title;
    // On va chercher la vidéo directement sur le NAS en ajoutant l'URL de base
    modalVideo.src = NAS_URL + '/' + file;
    modalOverlay.classList.add('open');
    modalVideo.play().catch(()=>{});
  }
  function closeModal(){
    modalOverlay.classList.remove('open');
    modalVideo.pause();
    modalVideo.removeAttribute('src');
    modalVideo.load();
  }
  modalClose.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', e=>{ if(e.target === modalOverlay) closeModal(); });
  document.addEventListener('keydown', e=>{ if(e.key === 'Escape') closeModal(); });

  searchInput.addEventListener('input', render);
  refreshBtn.addEventListener('click', loadManifest);

  loadManifest();
})();
</script>
</body>
</html>
