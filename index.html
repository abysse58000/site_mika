<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Stream NAS</title>
    <style>
        :root {
            --primary-color: #e50914;
            --background-color: #141414;
            --card-bg: #1f1f1f;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Grille des médias */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .media-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .media-card:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 15px rgba(229, 9, 20, 0.4);
        }

        .media-info {
            padding: 15px;
        }

        .media-title {
            font-size: 1rem;
            font-weight: bold;
            margin: 0 0 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .media-type {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        /* Lecteur vidéo */
        .player-container {
            display: none;
            margin-bottom: 30px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            max-height: 600px;
            display: block;
        }

        .player-header {
            background-color: var(--card-bg);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .close-btn:hover {
            background: #b80710;
        }

        .error-message {
            background-color: #5c0000;
            border: 1px solid red;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Mon Espace Vidéo Personnel</h1>
        <p>Flux direct depuis le serveur domestique</p>
    </header>

    <!-- Zone d'erreur -->
    <div id="error-box" class="error-message"></div>

    <!-- Zone du Lecteur Vidéo -->
    <div id="player-section" class="player-container">
        <div class="player-header">
            <span id="now-playing" style="font-weight: bold;">Lecture en cours...</span>
            <button class="close-btn" onclick="closePlayer()">Fermer</button>
        </div>
        <video id="video-player" controls preload="metadata">
            Votre navigateur ne supporte pas la lecture de vidéos HTML5.
        </video>
    </div>

    <!-- Grille de sélection -->
    <main>
        <h2>Vos Médias</h2>
        <div id="media-list" class="media-grid">
            <!-- Les cartes de vidéos seront injectées ici par le JS -->
        </div>
    </main>
</div>

<script>
    // ==========================================
    // CONFIGURATION DE L'ADRESSE DU NAS
    // ==========================================
    // Redirection sécurisée via le port alternatif 8443 configuré sur ta box !
    const NAS_URL = "https://radioswebmp3.synology.me:8443/site_mika";

    const mediaListContainer = document.getElementById('media-list');
    const playerSection = document.getElementById('player-section');
    const videoPlayer = document.getElementById('video-player');
    const nowPlayingTitle = document.getElementById('now-playing');
    const errorBox = document.getElementById('error-box');

    // Chargement dynamique du manifest.json depuis ton NAS
    async function loadManifest() {
        try {
            errorBox.style.display = 'none';
            // On va chercher le manifest directement à la source sur le NAS !
            const response = await fetch(`${NAS_URL}/manifest.json`);
            
            if (!response.ok) {
                throw new Error(`Impossible de récupérer le manifeste (Status: ${response.status})`);
            }
            
            const data = await response.json();
            renderMediaList(data);
        } catch (error) {
            console.error("Erreur lors de la récupération du manifest :", error);
            showError(`<strong>Erreur de connexion au NAS :</strong> Impossible de charger la liste des médias.<br>
            Vérifie que ton NAS est allumé et que la redirection de port sur ta box est bien fonctionnelle.`);
        }
    }

    // Affichage des médias sur la page
    function renderMediaList(mediaFiles) {
        mediaListContainer.innerHTML = '';

        if (!mediaFiles || mediaFiles.length === 0) {
            mediaListContainer.innerHTML = '<p>Aucun média disponible dans le dossier.</p>';
            return;
        }

        mediaFiles.forEach(media => {
            // Extraction de l'extension pour l'afficher ou filtrer
            const fileExtension = media.split('.').pop().toLowerCase();
            
            // On ne prend en charge que le MP4 et le MKV
            if (fileExtension !== 'mp4' && fileExtension !== 'mkv') return;

            const card = document.createElement('div');
            card.className = 'media-card';
            
            // Nettoyage du titre pour enlever l'extension et les "%20"
            const displayTitle = decodeURIComponent(media).replace(/\.[^/.]+$/, "");

            card.innerHTML = `
                <div class="media-info">
                    <p class="media-title" title="${displayTitle}">${displayTitle}</p>
                    <span class="media-type" style="color: ${fileExtension === 'mkv' ? '#00bcff' : '#00ff6c'}">${fileExtension}</span>
                </div>
            `;

            card.onclick = () => playVideo(media, displayTitle, fileExtension);
            mediaListContainer.appendChild(card);
        });
    }

    // Lancer la lecture de la vidéo
    function playVideo(fileName, cleanTitle, extension) {
        // Encodage propre du nom de fichier pour l'URL
        const videoUrl = `${NAS_URL}/${encodeURIComponent(fileName)}`;
        
        nowPlayingTitle.textContent = `Lecture de : ${cleanTitle}`;
        
        // Définition du type MIME adapté pour que le navigateur sache quoi en faire
        if (extension === 'mkv') {
            videoPlayer.type = 'video/x-matroska';
        } else {
            videoPlayer.type = 'video/mp4';
        }

        videoPlayer.src = videoUrl;
        playerSection.style.display = 'block';
        
        // On remonte l'écran vers le lecteur automatiquement
        playerSection.scrollIntoView({ behavior: 'smooth' });
        
        videoPlayer.play().catch(err => {
            console.warn("Échec de la lecture automatique :", err);
            // Si le MKV pose souci au navigateur, on avertit l'utilisateur
            if (extension === 'mkv') {
                showError(`<strong>Note sur le format MKV :</strong> Si la vidéo ne démarre pas ou si tu n'as pas de son, il est possible que ton navigateur ne gère pas les pistes de ce fichier. Privilégie le format MP4 si le problème persiste.`);
            }
        });
    }

    // Fermer le lecteur vidéo
    function closePlayer() {
        videoPlayer.pause();
        videoPlayer.src = "";
        playerSection.style.display = 'none';
        errorBox.style.display = 'none';
    }

    // Affichage des messages d'erreur
    function showError(message) {
        errorBox.innerHTML = message;
        errorBox.style.display = 'block';
    }

    // Lancement de l'application au chargement de la page
    window.onload = loadManifest;
</script>

</body>
</html>
